<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{REPORT_TITLE}}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --text-muted: #8b8fa8;
      --accent: #4f8ef7;
      --high: #f56565;
      --medium: #f6ad55;
      --low: #68d391;
      --conf-a: #4f8ef7;
      --conf-b: #a78bfa;
      --conf-c: #8b8fa8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 24px 16px;
      max-width: 860px;
      margin: 0 auto;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .meta { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; }
    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 28px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
    }
    h3 { font-size: 0.95rem; font-weight: 600; margin: 20px 0 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .exec-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .card-title { font-size: 0.95rem; font-weight: 600; flex: 1; }
    .badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .badge-high { background: rgba(245,101,101,0.15); color: var(--high); border: 1px solid rgba(245,101,101,0.3); }
    .badge-medium { background: rgba(246,173,85,0.15); color: var(--medium); border: 1px solid rgba(246,173,85,0.3); }
    .badge-low { background: rgba(104,211,145,0.15); color: var(--low); border: 1px solid rgba(104,211,145,0.3); }
    .badge-a { background: rgba(79,142,247,0.15); color: var(--conf-a); border: 1px solid rgba(79,142,247,0.3); }
    .badge-b { background: rgba(167,139,250,0.15); color: var(--conf-b); border: 1px solid rgba(167,139,250,0.3); }
    .badge-c { background: rgba(139,143,168,0.15); color: var(--conf-c); border: 1px solid rgba(139,143,168,0.3); }
    .summary { font-size: 0.9rem; color: var(--text); margin-bottom: 8px; }
    .implications {
      background: rgba(79,142,247,0.06);
      border: 1px solid rgba(79,142,247,0.15);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .implications strong { color: var(--text); }
    .source-line { font-size: 0.78rem; color: var(--text-muted); margin-top: 8px; }
    .source-line a { color: var(--conf-b); text-decoration: none; }
    .final-implications {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--medium);
      border-radius: 8px;
      padding: 16px 20px;
      margin-top: 24px;
      font-size: 0.9rem;
    }
    footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <h1>{{REPORT_TITLE}}</h1>
  <div class="meta">
    <span>📅 {{DATE}}</span>
    <span>🕐 生成: {{GENERATED_AT}}</span>
    <span>📰 対象期間: {{COVERAGE_WINDOW}}</span>
  </div>
</header>

<h2>Executive Summary</h2>
<div class="exec-summary">
  {{EXEC_SUMMARY}}
</div>

{{SECTION_CONTENT}}

<div class="final-implications">
  <strong>Implications for Business / Policy</strong><br><br>
  {{FINAL_IMPLICATIONS}}
</div>

<footer>
  Generated by Strategic Intelligence Daily Workflow &nbsp;|&nbsp; Confidence: A=一次情報 / B=準一次情報 / C=補助情報
</footer>

</body>
</html>
